<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 페르소나 채팅</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #818cf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Pretendard', sans-serif; overflow: hidden;
        }
        #navbar {
            height: 64px; background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px); display: flex; align-items: center;
            padding: 0 24px; border-bottom: 1px solid #1e293b;
            position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100;
        }
        #chat-container {
            display: flex; flex-direction: column;
            height: calc(100vh - 64px); margin-top: 64px;
            max-width: 800px; margin-left: auto; margin-right: auto;
        }
        #chat-log {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth;
        }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .msg-user { align-self: flex-end; background: var(--gradient); color: white; border-bottom-right-radius: 4px; }
        .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid #1e293b; border-bottom-left-radius: 4px; }
        .msg-system { align-self: center; background: rgba(30, 41, 59, 0.5); color: var(--text-dim); font-size: 12px; padding: 6px 16px; border-radius: 20px; }
        
        .input-area { padding: 20px; background: var(--bg); display: flex; gap: 10px; border-top: 1px solid #1e293b; }
        #user-input {
            flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid #1e293b;
            background: #0f172a; color: white; outline: none; font-size: 15px;
        }
        #send-btn {
            padding: 0 24px; border-radius: 12px; border: none;
            background: var(--gradient); color: white; font-weight: bold; cursor: pointer;
        }

        #setup-screen {
            position: fixed; inset: 0; background: #020617;
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }
        .setup-box {
            background: var(--card); padding: 40px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 400px;
            border: 1px solid #1e293b;
        }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1e293b; 
            background: #020617; color: white; box-sizing: border-box; margin-bottom: 20px;
        }
        .typing { padding: 10px 24px; font-size: 13px; color: var(--accent); display: none; }
    </style>
</head>
<body>

<nav id="navbar">
    <div style="font-weight: bold; font-size: 18px;">Gemini Chat</div>
    <div id="status" style="margin-left: auto; font-size: 12px; color: var(--text-dim);">Ready</div>
</nav>

<div id="setup-screen">
    <div class="setup-box">
        <h2 style="margin-bottom: 10px;">페르소나 설정</h2>
        <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 20px;">AI의 성격을 입력하고 시작하세요.</p>
        <input type="text" id="persona-input" placeholder="예: 까칠한 고양이, 친절한 비서" value="친절한 친구">
        <button id="start-btn" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--gradient); color:white; font-weight:bold; cursor:pointer;">대화 시작하기</button>
    </div>
</div>

<div id="chat-container">
    <div id="chat-log"></div>
    <div id="typing" class="typing">AI가 메시지를 작성 중...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off">
        <button id="send-btn">전송</button>
    </div>
</div>

<script type="module">
    // Current environment provided API Key (empty string for runtime injection)
    const apiKey = ""; 
    const modelId = "gemini-2.5-flash-preview-09-2025";

    let persona = "";
    const log = document.getElementById('chat-log');
    const uInput = document.getElementById('user-input');
    const typing = document.getElementById('typing');
    const setupScreen = document.getElementById('setup-screen');
    const startBtn = document.getElementById('start-btn');

    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'msg-user' : (role === 'system' ? 'msg-system' : 'msg-ai')}`;
        div.innerText = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    async function fetchAIResponse(userInput) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{
                parts: [{ text: userInput }]
            }],
            systemInstruction: {
                parts: [{ text: `당신의 페르소나는 다음과 같습니다: ${persona}. 반드시 한국어로 답변하고, 친근하게 2-3문장 내외로 대답하세요.` }]
            }
        };

        // Exponential backoff retry logic
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "Unknown error");
                }

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 생성할 수 없습니다.";
            } catch (error) {
                if (i === 4) throw error;
                await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
            }
        }
    }

    async function handleSend() {
        const text = uInput.value.trim();
        if (!text) return;

        addMsg("user", text);
        uInput.value = "";
        typing.style.display = "block";

        try {
            const reply = await fetchAIResponse(text);
            typing.style.display = "none";
            addMsg("ai", reply);
        } catch (error) {
            typing.style.display = "none";
            addMsg("system", `오류 발생: ${error.message}`);
        }
    }

    startBtn.onclick = () => {
        persona = document.getElementById('persona-input').value || "친절한 조수";
        setupScreen.style.display = "none";
        addMsg("system", `대화가 시작되었습니다. (페르소나: ${persona})`);
    };

    uInput.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
    document.getElementById('send-btn').onclick = handleSend;
</script>
</body>
</html>
