<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 Flash Persona Game</title>
    <style>
        /* 기본 스타일 초기화 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* 1. 상단 바 (기존 사이트 유지 공간) */
        #top-navbar {
            width: 100%;
            height: 60px;
            background: #1e293b;
            color: #f8fafc;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 1px solid #334155;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        /* 2. 게임 메인 영역 */
        #main-container {
            position: relative;
            margin-top: 60px; /* 상단 바 높이만큼 제외 */
            height: calc(100vh - 60px);
            width: 100%;
        }

        /* 3. 성격 설정 화면 (제일 먼저 보임) */
        #setup-overlay {
            position: absolute;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.5s ease;
        }

        .setup-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .setup-card h2 { color: #f8fafc; margin-bottom: 10px; }
        .setup-card p { color: #94a3b8; margin-bottom: 25px; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus { border-color: #3b82f6; }

        #start-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        #start-btn:hover { background: #2563eb; }

        /* 4. 게임 영역 (iframe) */
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* 성격 설정 전까지 숨김 */
        }

        /* 5. AI 채팅창 오버레이 */
        #chat-window {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none; /* 성격 설정 전까지 숨김 */
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        #chat-header {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #94a3b8;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg { padding: 10px 14px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg-user { align-self: flex-end; background: #3b82f6; color: white; }
        .msg-ai { align-self: flex-start; background: #334155; color: #f1f5f9; }

        #chat-input-area {
            padding: 15px;
            display: flex;
            gap: 8px;
        }

        #chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            outline: none;
        }

        #send-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 상단 네비게이션 바 -->
    <nav id="top-navbar">
        <div style="font-weight: bold; font-size: 1.2rem; color: #60a5fa;">GEMINI GAME ARENA</div>
    </nav>

    <div id="main-container">
        <!-- 1단계: 성격 설정 오버레이 -->
        <div id="setup-overlay">
            <div class="setup-card">
                <h2>AI 페르소나 설정</h2>
                <p>게임 속 AI의 성격을 입력하면 게임이 시작됩니다.</p>
                <input type="text" id="persona-input" placeholder="예: 무뚝뚝하지만 친절한 가이드, 츤데레">
                <button id="start-btn">게임 접속 및 대화 시작</button>
            </div>
        </div>

        <!-- 2단계: 게임 사이트 -->
        <iframe id="game-frame" src="https://minefun.io/"></iframe>

        <!-- 3단계: AI 대화창 -->
        <div id="chat-window">
            <div id="chat-header">
                <span id="persona-tag"># 페르소나 미설정</span>
                <span style="cursor: pointer;" onclick="toggleChat()">➖</span>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="user-input" placeholder="AI에게 말 걸기...">
                <button id="send-btn">전송</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBph3eVitxFUIkBB1QRNYDS8lyTUgg7yrg";
        const MODEL_ID = "gemini-3-flash-preview";

        const setupOverlay = document.getElementById('setup-overlay');
        const gameFrame = document.getElementById('game-frame');
        const chatWindow = document.getElementById('chat-window');
        const personaInput = document.getElementById('persona-input');
        const startBtn = document.getElementById('start-btn');
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const personaTag = document.getElementById('persona-tag');

        let currentPersona = "";

        // [시작] 성격 설정 및 게임 로드
        startBtn.onclick = () => {
            const val = personaInput.value.trim();
            if(!val) {
                alert("AI의 성격을 입력해주세요!");
                return;
            }

            currentPersona = val;
            personaTag.innerText = `# ${currentPersona}`;

            // 화면 전환
            setupOverlay.style.opacity = '0';
            setTimeout(() => {
                setupOverlay.style.display = 'none';
                gameFrame.style.display = 'block';
                chatWindow.style.display = 'flex';
            }, 500);

            addMessage("system", `성격 [${currentPersona}]이 주입되었습니다. 대화를 시작하세요!`);
        };

        // [메시지 추가]
        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role === 'user' ? 'msg-user' : (role === 'system' ? '' : 'msg-ai')}`;
            if(role === 'system') msgDiv.style.cssText = "align-self: center; background: none; color: #64748b; font-size: 12px;";
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // [AI 대화 API 호출]
        async function sendMessage() {
            const text = userInput.value.trim();
            if(!text) return;

            addMessage("user", text);
            userInput.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: `당신의 성격은 [${currentPersona}]입니다. 사용자는 현재 게임을 즐기고 있습니다. 성격에 맞춰 짧고 재치있게 대답하세요.` }]
                        },
                        contents: [{ role: "user", parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                addMessage("ai", aiResponse);

            } catch (error) {
                addMessage("system", "연결 실패: API 키 혹은 네트워크를 확인하세요.");
            }
        }

        // [이벤트 리스너]
        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function toggleChat() {
            const isMini = chatWindow.style.height === '40px';
            chatWindow.style.height = isMini ? '500px' : '40px';
        }
    </script>
</body>
</html>
