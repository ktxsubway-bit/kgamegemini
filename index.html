<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Persona Chat (Latest SDK)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #f1f5f9; }
        .chat-container { height: calc(100vh - 160px); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .message-in { animation: fadeInScale 0.3s ease-out forwards; }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 네비게이션 바 -->
    <nav class="glass-nav sticky top-0 z-50 h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="font-extrabold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">GEMINI LIVE</span>
        </div>
        <div id="connection-status" class="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full border border-slate-700">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold text-slate-300 uppercase" id="status-label">Standby</span>
        </div>
    </nav>

    <!-- 페르소나 설정 화면 -->
    <div id="setup-overlay" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-md shadow-2xl message-in">
            <h2 class="text-2xl font-bold mb-2 text-white">페르소나 설정</h2>
            <p class="text-slate-400 text-sm mb-8">AI가 어떤 성격으로 대화할지 정해주세요.</p>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[11px] font-bold text-indigo-400 uppercase tracking-wider mb-2 block">AI의 성격 (Persona)</label>
                    <input type="text" id="persona-input" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all"
                        placeholder="예: 까칠한 고양이, 친절한 요리사..." value="다정하고 따뜻한 친구">
                </div>
                <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-600/30 transition-all active:scale-95">
                    대화 시작하기
                </button>
            </div>
            <p class="mt-6 text-[10px] text-slate-500 text-center">3개의 API 키 중 최적의 상태를 자동으로 감지합니다.</p>
        </div>
    </div>

    <!-- 채팅 영역 -->
    <main class="flex-1 chat-container overflow-hidden relative">
        <div id="chat-log" class="h-full overflow-y-auto custom-scrollbar p-6 space-y-6">
            <!-- 메시지 로그 -->
        </div>

        <!-- 타이핑 인디케이터 -->
        <div id="typing-indicator" class="hidden absolute bottom-4 left-6">
            <div class="bg-slate-800 px-4 py-2 rounded-2xl flex gap-1 items-center border border-slate-700">
                <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                <div class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
            </div>
        </div>
    </main>

    <!-- 입력창 -->
    <footer class="p-4 bg-slate-950/90 border-t border-slate-800/50">
        <div class="max-w-4xl mx-auto flex gap-3 bg-slate-900 border border-slate-800 rounded-2xl p-2 focus-within:ring-2 focus-within:ring-indigo-500/30 transition-all items-center">
            <input type="text" id="user-input" 
                class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-slate-200 placeholder-slate-500" 
                placeholder="메시지를 입력하세요..." autocomplete="off">
            <!-- 명시적인 전송 버튼 -->
            <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white w-12 h-12 min-w-[3rem] rounded-xl flex items-center justify-center transition-all active:scale-90 shadow-lg shadow-indigo-600/20">
                <svg class="w-6 h-6 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </footer>

    <!-- 최신 라이브러리 모듈 설정 -->
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>
    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const apiKeys = [
            "AIzaSyAF-MPQ9bnBHOVpI2fBVGG3zHQW-pBYVpQ",
            "AIzaSyBph3eVitxFUIkBB1QRNYDS8lyTUgg7yrg",
            "AIzaSyDvR1d58iNJqpYck_gIGDW7Rc02u01-SpQ"
        ];
        
        let currentKeyIdx = 0;
        let persona = "";
        let chat = null;
        let model = null;

        const chatLog = document.getElementById('chat-log');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const setupOverlay = document.getElementById('setup-overlay');
        const startBtn = document.getElementById('start-btn');
        const statusLabel = document.getElementById('status-label');

        function addMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-in`;
            
            const content = document.createElement('div');
            content.className = `max-w-[85%] px-5 py-3 rounded-2xl text-sm leading-relaxed ${
                role === 'user' 
                ? 'bg-indigo-600 text-white rounded-br-none shadow-lg' 
                : (role === 'system' 
                    ? 'bg-slate-800/40 text-slate-500 text-xs italic mx-auto rounded-full px-4' 
                    : 'bg-slate-800 text-slate-200 rounded-bl-none border border-slate-700/50')
            }`;
            content.innerText = text;
            
            wrapper.appendChild(content);
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function initializeModel() {
            const maxKeys = apiKeys.length;
            for (let i = 0; i < maxKeys; i++) {
                const idx = (currentKeyIdx + i) % maxKeys;
                try {
                    const genAI = new GoogleGenerativeAI(apiKeys[idx]);
                    const genModel = genAI.getGenerativeModel({ 
                        model: "gemini-2.5-flash-preview-09-2025",
                        systemInstruction: `Persona: ${persona}. 반드시 한국어로 대화하세요. 2~3문장 내외로 답하세요.`
                    });
                    
                    // 연결 확인용 테스트
                    await genModel.generateContent({ contents: [{ role: 'user', parts: [{ text: 'ping' }] }] });
                    
                    currentKeyIdx = idx;
                    model = genModel;
                    chat = model.startChat();
                    statusLabel.innerText = `Connected (K${idx + 1})`;
                    return true;
                } catch (e) {
                    console.error(`Key ${idx + 1} initialization failed. Trying next key...`);
                }
            }
            return false;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            addMessage('user', text);
            userInput.value = "";
            sendBtn.disabled = true;
            typingIndicator.classList.remove('hidden');

            try {
                let responseText = "";
                let retrySuccess = false;
                
                try {
                    const result = await chat.sendMessage(text);
                    responseText = result.response.text();
                    retrySuccess = true;
                } catch (err) {
                    console.warn("First attempt failed, switching key...");
                    currentKeyIdx = (currentKeyIdx + 1) % apiKeys.length;
                    const initialized = await initializeModel();
                    if (initialized) {
                        const result = await chat.sendMessage(text);
                        responseText = result.response.text();
                        retrySuccess = true;
                    }
                }
                
                if (!retrySuccess) throw new Error("모든 API 키가 만료되었거나 작동하지 않습니다.");
                
                typingIndicator.classList.add('hidden');
                addMessage('ai', responseText);
            } catch (error) {
                typingIndicator.classList.add('hidden');
                addMessage('system', `오류: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        startBtn.addEventListener('click', async () => {
            persona = document.getElementById('persona-input').value.trim() || "다정한 친구";
            startBtn.disabled = true;
            startBtn.innerText = "연결 중...";
            
            const success = await initializeModel();
            if (success) {
                setupOverlay.classList.add('opacity-0');
                setTimeout(() => {
                    setupOverlay.style.display = 'none';
                    userInput.focus();
                }, 300);
                addMessage('system', `채팅 시작! 페르소나: ${persona}`);
            } else {
                alert("사용 가능한 API 키가 없거나 연결에 실패했습니다.");
                startBtn.disabled = false;
                startBtn.innerText = "대화 시작하기";
            }
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        sendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleSend();
        });

    </script>
</body>
</html>
