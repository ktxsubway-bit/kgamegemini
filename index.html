<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 페르소나 대화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
        }
        .message-bubble { 
            max-width: 85%; 
            animation: slideUp 0.2s ease-out; 
            word-break: break-all; 
            white-space: pre-wrap;
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .glass-header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 상단 바 -->
    <header class="h-14 flex items-center justify-between px-6 glass-header sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-blue-600 rounded-md flex items-center justify-center shadow-lg shadow-blue-900/20">
                <span class="text-white font-black text-xs">AI</span>
            </div>
            <h1 class="font-bold text-sm tracking-tight text-slate-200">AI 페르소나 대화</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="persona-btn" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded border border-slate-600 text-slate-300 transition-all">
                AI 말투 바꾸기
            </button>
            <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
    </header>

    <!-- 성격 설정 창 -->
    <div id="persona-modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-2">AI 캐릭터 설정</h2>
            <p class="text-slate-400 text-xs mb-6">AI가 어떤 사람처럼 말하면 좋을지 적어주세요.</p>
            <div class="space-y-4">
                <input type="text" id="persona-input" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: 다정한 선생님, 장난기 많은 친구" value="장난기 많은 친구">
                <button id="save-persona-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all">설정 완료하고 대화하기</button>
            </div>
        </div>
    </div>

    <!-- 채팅창 -->
    <main class="flex-1 overflow-y-auto p-4 space-y-5 pb-24" id="chat-log"></main>

    <!-- 대기 중 UI -->
    <div id="loading-ui" class="hidden fixed bottom-24 left-6 bg-slate-800/95 px-4 py-2.5 rounded-2xl border border-slate-700 flex items-center gap-2 z-40 shadow-2xl">
        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></div>
        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        <span id="loading-text" class="text-[10px] font-bold text-blue-300 ml-1">AI가 생각하고 있어요...</span>
    </div>

    <!-- 하단 입력 영역 -->
    <footer class="p-4 bg-slate-950/80 border-t border-white/5 backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="chat-input" 
                class="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-5 py-3 text-white outline-none focus:ring-2 focus:ring-blue-600 transition-all placeholder-slate-600" 
                placeholder="AI에게 메시지를 보내보세요...">
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 rounded-2xl font-bold shadow-lg shadow-blue-900/20 active:scale-90 transition-all flex items-center justify-center group">
                <svg class="w-5 h-5 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const GROQ_API_KEYS = [
            "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",
            "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"
        ];
        
        let currentKeyIndex = 0;
        let messageHistory = [];
        let aiPersona = "장난기 많은 친구";
        
        const MODEL_ID = "llama-3.1-8b-instant";

        const chatLog = document.getElementById('chat-log');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingUi = document.getElementById('loading-ui');
        const loadingText = document.getElementById('loading-text');
        const personaModal = document.getElementById('persona-modal');
        const personaInput = document.getElementById('persona-input');
        const savePersonaBtn = document.getElementById('save-persona-btn');
        const personaBtn = document.getElementById('persona-btn');

        function appendMessage(role, text, isError = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble px-4 py-2.5 rounded-2xl text-sm leading-relaxed shadow-sm ${
                isError ? 'bg-red-900/40 text-red-200 border border-red-800/50' :
                role === 'user' 
                ? 'bg-blue-600 text-white rounded-br-none' 
                : 'bg-slate-800 text-slate-200 rounded-bl-none border border-slate-700/50'
            }`;
            
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function fetchAIResponse(userInput) {
            const endpoint = "https://api.groq.com/openai/v1/chat/completions";
            
            for (let i = currentKeyIndex; i < GROQ_API_KEYS.length; i++) {
                const apiKey = GROQ_API_KEYS[i];
                
                try {
                    const response = await fetch(endpoint, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${apiKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: MODEL_ID,
                            messages: [
                                { 
                                    role: "system", 
                                    content: `당신의 캐릭터는 "${aiPersona}"입니다. 이 캐릭터의 말투와 성격에 완전히 몰입하여 한국어로 답변하세요. 너무 길지 않게 핵심만 말하되 캐릭터의 특징을 잘 보여주어야 합니다.` 
                                },
                                ...messageHistory,
                                { role: "user", content: userInput }
                            ],
                            temperature: 0.8,
                            max_tokens: 1500
                        })
                    });

                    if (response.status === 429 || response.status === 401) {
                        if (i < GROQ_API_KEYS.length - 1) {
                            currentKeyIndex = i + 1;
                            loadingText.textContent = "잠시만 기다려주세요 (회선 전환 중)...";
                            continue;
                        }
                    }

                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error?.message || "서버 응답 오류");
                    
                    return result.choices[0].message.content;

                } catch (err) {
                    if (i === GROQ_API_KEYS.length - 1) throw err;
                    currentKeyIndex = i + 1;
                }
            }
        }

        async function handleSendMessage() {
            const content = chatInput.value.trim();
            if (!content || sendBtn.disabled) return;

            appendMessage('user', content);
            chatInput.value = "";
            sendBtn.disabled = true;
            loadingUi.classList.remove('hidden');
            loadingText.textContent = "AI가 생각하고 있어요...";

            try {
                const responseText = await fetchAIResponse(content);
                
                messageHistory.push({ role: "user", content: content });
                messageHistory.push({ role: "assistant", content: responseText });
                if (messageHistory.length > 10) messageHistory.splice(0, 2);

                appendMessage('ai', responseText);
            } catch (error) {
                appendMessage('ai', `⚠️ 에러가 발생했어요: ${error.message}`, true);
            } finally {
                loadingUi.classList.add('hidden');
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        savePersonaBtn.onclick = () => {
            const val = personaInput.value.trim();
            if (val) {
                aiPersona = val;
                personaModal.classList.add('hidden');
                chatLog.innerHTML = ""; 
                messageHistory = [];
                appendMessage('ai', `대화를 시작합니다.`);
            }
        };

        personaBtn.onclick = () => {
            personaModal.classList.remove('hidden');
        };

        sendBtn.onclick = handleSendMessage;
        chatInput.onkeydown = (e) => {
            if (e.key === 'Enter') handleSendMessage();
        };

    </script>
</body>
</html>
