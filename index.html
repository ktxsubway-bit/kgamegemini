<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3 Persona Chat</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --ai-bubble: #334155;
            --user-bubble: #2563eb;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Pretendard', sans-serif; overflow: hidden;
        }

        /* 상단 바 */
        #navbar {
            height: 60px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px); display: flex; align-items: center;
            padding: 0 20px; border-bottom: 1px solid #334155;
            position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100;
        }

        /* 메인 컨테이너 */
        #chat-container {
            display: flex; flex-direction: column;
            height: calc(100vh - 60px); margin-top: 60px;
            max-width: 800px; margin-left: auto; margin-right: auto;
            position: relative;
        }

        /* 성격 설정 오버레이 */
        #setup-screen {
            position: fixed; inset: 0; background: var(--bg-color);
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }

        .setup-box {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 채팅 로그 */
        #chat-log {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
            scrollbar-width: thin; scrollbar-color: #475569 transparent;
        }

        .msg { padding: 12px 16px; border-radius: 15px; max-width: 80%; line-height: 1.6; font-size: 15px; }
        .msg-user { align-self: flex-end; background: var(--user-bubble); color: white; border-bottom-right-radius: 2px; }
        .msg-ai { align-self: flex-start; background: var(--ai-bubble); color: var(--text-main); border-bottom-left-radius: 2px; }
        .msg-system { align-self: center; background: none; color: var(--text-dim); font-size: 13px; margin: 10px 0; }

        /* 입력 영역 */
        .input-area {
            padding: 20px; background: var(--bg-color);
            display: flex; gap: 10px; border-top: 1px solid #334155;
        }

        input[type="text"] {
            flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #334155;
            background: #1e293b; color: white; outline: none; font-size: 15px;
        }

        input[type="text"]:focus { border-color: var(--accent); }

        button {
            padding: 10px 24px; border-radius: 10px; border: none;
            background: var(--accent); color: white; font-weight: bold; cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        /* 로딩 애니메이션 */
        .typing { font-style: italic; color: var(--text-dim); font-size: 13px; display: none; }
    </style>
</head>
<body>

    <nav id="navbar">
        <div style="font-weight: 800; letter-spacing: 1px; color: #60a5fa;">GEMINI CHAT</div>
        <div id="status-tag" style="margin-left: auto; font-size: 12px; color: #4ade80;">Online</div>
    </nav>

    <!-- 1단계: 성격 설정 -->
    <div id="setup-screen">
        <div class="setup-box">
            <h2 style="margin: 0 0 10px 0;">페르소나 설정</h2>
            <p style="color: var(--text-dim); font-size: 14px;">대화하고 싶은 상대의 성격을 입력하세요.</p>
            <input type="text" id="persona-input" placeholder="예: 시니컬한 철학자, 나를 응원해주는 친구" style="margin-top: 20px;">
            <button id="start-btn" style="width: 100%; margin-top: 10px;">대화 시작하기</button>
        </div>
    </div>

    <!-- 2단계: 채팅 본문 -->
    <div id="chat-container">
        <div id="chat-log">
            <!-- 메시지가 여기 쌓입니다 -->
        </div>
        <div id="typing-indicator" class="typing" style="padding: 0 20px 10px 20px;">AI가 생각 중...</div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off">
            <button id="send-btn">전송</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBph3eVitxFUIkBB1QRNYDS8lyTUgg7yrg";
        const MODEL = "gemini-3-flash-preview";

        let persona = "";
        let chatHistory = []; // 대화 문맥 유지

        const setupScreen = document.getElementById('setup-screen');
        const chatLog = document.getElementById('chat-log');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        // [시작]
        document.getElementById('start-btn').onclick = () => {
            const val = document.getElementById('persona-input').value.trim();
            if(!val) return alert("성격을 입력해주세요!");
            
            persona = val;
            setupScreen.style.display = 'none';
            addMsg("system", `AI의 성격이 [${persona}](으)로 설정되었습니다.`);
        };

        // [메시지 UI 추가]
        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : (role === 'system' ? 'msg-system' : 'msg-ai')}`;
            div.innerText = text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        // [API 통신]
        async function fetchAI() {
            const text = userInput.value.trim();
            if(!text) return;

            addMsg("user", text);
            userInput.value = "";
            typingIndicator.style.display = "block";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { 
                            parts: [{ text: `너의 성격: ${persona}. 대화 상대에게 이 페르소나를 유지하며 친근하거나 성격에 맞게 한국어로 대답해.` }] 
                        },
                        contents: [
                            ...chatHistory,
                            { role: "user", parts: [{ text: text }] }
                        ]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                typingIndicator.style.display = "none";
                addMsg("ai", aiText);

                // 문맥 저장을 위한 히스토리 업데이트
                chatHistory.push({ role: "user", parts: [{ text: text }] });
                chatHistory.push({ role: "model", parts: [{ text: aiText }] });

            } catch (e) {
                typingIndicator.style.display = "none";
                addMsg("system", "연결 오류가 발생했습니다. 다시 시도해주세요.");
            }
        }

        document.getElementById('send-btn').onclick = fetchAI;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') fetchAI(); };
    </script>
</body>
</html>
