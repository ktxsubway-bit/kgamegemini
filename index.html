<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 페르소나 채팅</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #818cf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Pretendard', sans-serif; overflow: hidden;
        }
        #navbar {
            height: 64px; background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px); display: flex; align-items: center;
            padding: 0 24px; border-bottom: 1px solid #1e293b;
            position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100;
        }
        #chat-container {
            display: flex; flex-direction: column;
            height: calc(100vh - 64px); margin-top: 64px;
            max-width: 900px; margin-left: auto; margin-right: auto;
        }
        #chat-log {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }
        .msg { padding: 14px 20px; border-radius: 20px; max-width: 85%; line-height: 1.6; font-size: 15px; }
        .msg-user { align-self: flex-end; background: var(--gradient); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid #1e293b; border-bottom-left-radius: 4px; }
        .msg-system { align-self: center; background: rgba(30, 41, 59, 0.5); color: var(--text-dim); font-size: 12px; padding: 6px 16px; border-radius: 20px; }
        
        /* 입력 영역 디자인 수정: 버튼과 입력창 높이 통일 */
        .input-area { 
            padding: 24px; 
            background: var(--bg); 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid #1e293b;
            align-items: stretch; /* 자식 요소들의 높이를 같게 설정 */
        }
        #user-input {
            flex: 1; 
            padding: 0 16px; /* 상하 패딩 대신 높이로 조절 */
            height: 54px; /* 높이 고정 */
            border-radius: 14px; 
            border: 1px solid #1e293b;
            background: #0f172a; 
            color: white; 
            outline: none; 
            transition: all 0.2s;
            font-size: 15px;
            box-sizing: border-box;
        }
        #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        #send-btn {
            height: 54px; /* 입력창과 동일한 높이 */
            padding: 0 28px; 
            border-radius: 14px; 
            border: none;
            background: var(--gradient); 
            color: white; 
            font-weight: bold; 
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        #send-btn:hover { opacity: 0.9; }

        /* 설정 화면 */
        #setup-screen {
            position: fixed; inset: 0; background: #020617;
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }
        .setup-box {
            background: var(--card); padding: 48px; border-radius: 32px;
            text-align: center; width: 90%; max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        select, input {
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #1e293b; 
            background: #020617; color: white; box-sizing: border-box; margin-bottom: 20px;
            font-size: 15px;
        }
        .typing { padding: 10px 24px; font-size: 13px; color: var(--accent); display: none; }
        .loading-models { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }

        /* 나가기 버튼 스타일 */
        #exit-btn {
            background: #1e293b;
            color: var(--text-dim);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 12px;
            transition: all 0.2s;
        }
        #exit-btn:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>

<nav id="navbar">
    <div style="font-weight: 900; font-size: 20px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Gemini 페르소나 대화</div>
    <div id="status-info" style="margin-left: auto; font-size: 11px; color: var(--text-dim);">시스템 연결 대기 중</div>
    <button id="exit-btn" style="display: none;">나가기</button>
</nav>

<div id="setup-screen">
    <div class="setup-box">
        <h2 style="margin-top:0; font-size:24px;">AI 채팅 설정</h2>
        <p style="color: var(--text-dim); margin-bottom: 30px;">모델을 선택하세요! (권장모델: gemini-2.5-flash)</p>
        
        <div id="model-loading-status" class="loading-models">모델 목록 로드 중...</div>
        <label style="display:block; text-align:left; font-size:12px; color:var(--accent); margin-bottom:8px; font-weight:bold;">인공지능 모델 선택</label>
        <select id="model-select" disabled>
            <option value="">불러오는 중...</option>
        </select>

        <label style="display:block; text-align:left; font-size:12px; color:var(--accent); margin-bottom:8px; font-weight:bold;">AI의 말투/성격 설정</label>
        <input type="text" id="persona-input" placeholder="예: 친절한 선생님, 유머러스한 친구" value="">
        
        <button id="start-btn" style="width:100%; padding:18px; border-radius:12px; border:none; background:var(--gradient); color:white; font-weight:bold; cursor:pointer;" disabled>모델을 선택해 주세요</button>
    </div>
</div>

<div id="chat-container">
    <div id="chat-log"></div>
    <div id="typing" class="typing">AI가 답변을 생성 중입니다...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="여기에 입력하세요..." autocomplete="off">
        <button id="send-btn">보내기</button>
    </div>
</div>

<script type="module">
    // 제공된 API 키 리스트
    const apiKeys = [
        "AIzaSyAF-MPQ9bnBHOVpI2fBVGG3zHQW-pBYVpQ",
        "AIzaSyBph3eVitxFUIkBB1QRNYDS8lyTUgg7yrg",
        "AIzaSyDvR1d58iNJqpYck_gIGDW7Rc02u01-SpQ"
    ]; 
    let currentKeyIndex = 0;

    let selectedModel = "";
    let persona = "";

    const log = document.getElementById('chat-log');
    const uInput = document.getElementById('user-input');
    const typing = document.getElementById('typing');
    const startBtn = document.getElementById('start-btn');
    const exitBtn = document.getElementById('exit-btn');
    const setupScreen = document.getElementById('setup-screen');
    const modelSelect = document.getElementById('model-select');
    const modelStatus = document.getElementById('model-loading-status');
    const statusInfo = document.getElementById('status-info');

    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'msg-user' : (role === 'system' ? 'msg-system' : 'msg-ai')}`;
        div.innerText = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    // 사용 가능한 모델 리스트 가져오기
    async function loadAvailableModels() {
        const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKeys[currentKeyIndex]}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("모델 목록을 가져오지 못했습니다.");
            
            const data = await response.json();
            const models = data.models || [];
            
            modelSelect.innerHTML = "";
            const validModels = models.filter(m => m.supportedGenerationMethods.includes("generateContent"));
            
            if (validModels.length === 0) {
                modelStatus.innerText = "사용 가능한 모델이 없습니다.";
                return;
            }

            validModels.forEach(model => {
                const opt = document.createElement('option');
                opt.value = model.name.split('/').pop();
                opt.innerText = `${opt.value} (${model.displayName})`;
                modelSelect.appendChild(opt);
            });

            modelSelect.disabled = false;
            startBtn.disabled = false;
            startBtn.innerText = "채팅 시작하기";
            modelStatus.innerText = `총 ${validModels.length}개의 모델을 찾았습니다.`;
        } catch (e) {
            console.error(e);
            modelStatus.innerText = "오류 발생: API 키를 확인하거나 잠시 후 시도하세요.";
        }
    }

    async function fetchGeminiResponse(userText) {
        const maxRetries = 5;
        let delay = 1000;
        const systemPrompt = `Persona: ${persona || '친절한 AI 친구'}. 반드시 한국어로 답변해. 앞에 붙인 성격을 분명하게 하고, 3문장 이내로 작성해.`;
        
        const tryRequest = async (key) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${key}`;
            const payload = {
                contents: [{ parts: [{ text: userText }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw { status: response.status, message: errorData.error?.message || "알 수 없는 오류" };
            }

            const result = await response.json();
            return result.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 생성하지 못했습니다.";
        };

        for (let i = 0; i < maxRetries; i++) {
            try {
                return await tryRequest(apiKeys[currentKeyIndex]);
            } catch (error) {
                if (error.status === 429 && currentKeyIndex < apiKeys.length - 1) {
                    currentKeyIndex++;
                    continue; 
                }
                if (i === maxRetries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
        }
    }

    async function handleSend() {
        const text = uInput.value.trim();
        if (!text) return;

        addMsg("user", text);
        uInput.value = "";
        typing.style.display = "block";

        try {
            const aiResponse = await fetchGeminiResponse(text);
            typing.style.display = "none";
            addMsg("ai", aiResponse);
        } catch (e) {
            typing.style.display = "none";
            addMsg("system", `오류: ${e.message}`);
        }
    }

    // 채팅 시작
    startBtn.onclick = () => {
        persona = document.getElementById('persona-input').value;
        selectedModel = document.getElementById('model-select').value;
        setupScreen.style.display = "none";
        exitBtn.style.display = "block"; // 나가기 버튼 표시
        statusInfo.innerText = `연결됨: ${selectedModel}`;
        addMsg("system", "AI와 연결되었습니다. 대화를 시작해 보세요!");
    };

    // 설정으로 돌아가기 (나가기)
    exitBtn.onclick = () => {
        if(confirm("대화를 종료하고 설정 화면으로 돌아가시겠습니까? 대화 기록은 초기화됩니다.")) {
            log.innerHTML = ""; // 로그 초기화
            setupScreen.style.display = "flex";
            exitBtn.style.display = "none";
            statusInfo.innerText = "시스템 연결 대기 중";
        }
    };

    uInput.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
    document.getElementById('send-btn').onclick = handleSend;

    window.onload = loadAvailableModels;
</script>
</body>
</html>
