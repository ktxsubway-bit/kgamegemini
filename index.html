<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Persona Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
        }
        .message-bubble { 
            max-width: 85%; 
            animation: slideUp 0.2s ease-out; 
            word-break: break-all; 
            white-space: pre-wrap;
        }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .glass-header { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="h-14 flex items-center justify-between px-6 glass-header sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-orange-600 rounded-md flex items-center justify-center shadow-lg shadow-orange-900/20">
                <span class="text-white font-black text-xs">G</span>
            </div>
            <h1 class="font-bold text-sm tracking-tight text-slate-200">Groq Llama 3.3</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="persona-btn" class="text-[10px] bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded border border-slate-600 text-slate-300 transition-all">
                성격 변경
            </button>
            <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
    </header>

    <!-- Persona Setup Modal -->
    <div id="persona-modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-2">AI 성격 설정</h2>
            <p class="text-slate-400 text-xs mb-6">AI가 어떤 성격으로 대화할지 정해주세요.</p>
            <div class="space-y-4">
                <input type="text" id="persona-input" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-orange-500" placeholder="예: 시니컬한 천재 개발자, 다정한 선생님" value="다정하고 똑똑한 친구">
                <button id="save-persona-btn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 rounded-xl transition-all">설정 저장 및 시작</button>
            </div>
        </div>
    </div>

    <!-- Chat Log Area -->
    <main class="flex-1 overflow-y-auto p-4 space-y-5 pb-24" id="chat-log"></main>

    <!-- Loading UI -->
    <div id="loading-ui" class="hidden fixed bottom-24 left-6 bg-slate-800/95 px-4 py-2.5 rounded-2xl border border-slate-700 flex items-center gap-2 z-40 shadow-2xl">
        <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce"></div>
        <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
        <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        <span class="text-[10px] font-bold text-orange-300 ml-1">생각 중...</span>
    </div>

    <!-- Input Footer -->
    <footer class="p-4 bg-slate-950/80 border-t border-white/5 backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="chat-input" 
                class="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-5 py-3 text-white outline-none focus:ring-2 focus:ring-orange-600 transition-all placeholder-slate-600" 
                placeholder="메시지를 입력하세요...">
            <button id="send-btn" class="bg-orange-600 hover:bg-orange-500 text-white px-6 rounded-2xl font-bold shadow-lg shadow-orange-900/20 active:scale-90 transition-all flex items-center justify-center group">
                <svg class="w-5 h-5 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const GROQ_API_KEY = "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";
        
        let messageHistory = [];
        let aiPersona = "중학교 일진";
        
        const chatLog = document.getElementById('chat-log');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingUi = document.getElementById('loading-ui');
        const personaModal = document.getElementById('persona-modal');
        const personaInput = document.getElementById('persona-input');
        const savePersonaBtn = document.getElementById('save-persona-btn');
        const personaBtn = document.getElementById('persona-btn');

        function appendMessage(role, text, isError = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = `message-bubble px-4 py-2.5 rounded-2xl text-sm leading-relaxed shadow-sm ${
                isError ? 'bg-red-900/40 text-red-200 border border-red-800/50' :
                role === 'user' 
                ? 'bg-orange-600 text-white rounded-br-none' 
                : 'bg-slate-800 text-slate-200 rounded-bl-none border border-slate-700/50'
            }`;
            
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function fetchAIResponse(userInput) {
            const endpoint = "https://api.groq.com/openai/v1/chat/completions";
            
            const payload = {
                model: "llama-3.3-70b-versatile",
                messages: [
                    { 
                        role: "system", 
                        content: `당신의 성격은 "${aiPersona}"입니다. 이 성격에 완전히 몰입하여 한국어로 답변하세요. 간결하고 명확하게 말하되 성격의 특징을 잘 살려야 합니다.` 
                    },
                    ...messageHistory,
                    { role: "user", content: userInput }
                ],
                temperature: 0.8,
                max_tokens: 1500
            };

            const response = await fetch(endpoint, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorBody = await response.json();
                throw new Error(errorBody.error?.message || "서버 응답 오류");
            }

            const result = await response.json();
            return result.choices[0].message.content;
        }

        async function handleSendMessage() {
            const content = chatInput.value.trim();
            if (!content || sendBtn.disabled) return;

            appendMessage('user', content);
            chatInput.value = "";
            sendBtn.disabled = true;
            loadingUi.classList.remove('hidden');

            try {
                const responseText = await fetchAIResponse(content);
                
                messageHistory.push({ role: "user", content: content });
                messageHistory.push({ role: "assistant", content: responseText });
                if (messageHistory.length > 10) messageHistory.splice(0, 2);

                appendMessage('ai', responseText);
            } catch (error) {
                appendMessage('ai', `⚠️ 에러: ${error.message}`, true);
            } finally {
                loadingUi.classList.add('hidden');
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        savePersonaBtn.onclick = () => {
            const val = personaInput.value.trim();
            if (val) {
                aiPersona = val;
                personaModal.classList.add('hidden');
                chatLog.innerHTML = ""; // 성격이 바뀌면 대화 초기화 (선택 사항)
                messageHistory = [];
                appendMessage('ai', `알겠습니다. 저는 이제부터 "${aiPersona}"입니다. 대화를 시작해볼까요?`);
            }
        };

        personaBtn.onclick = () => {
            personaModal.classList.remove('hidden');
        };

        sendBtn.onclick = handleSendMessage;
        chatInput.onkeydown = (e) => {
            if (e.key === 'Enter') handleSendMessage();
        };

    </script>
</body>
</html>
