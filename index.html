<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 페르소나 채팅</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #6366f1;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Pretendard', -apple-system, sans-serif; overflow: hidden;
        }
        #navbar {
            height: 60px; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px); display: flex; align-items: center;
            padding: 0 20px; border-bottom: 1px solid #1e293b;
            position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 100;
        }
        #chat-container {
            display: flex; flex-direction: column;
            height: calc(100vh - 60px); margin-top: 60px;
            max-width: 800px; margin-left: auto; margin-right: auto;
        }
        #chat-log {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth;
        }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 15px; word-break: break-word; }
        .msg-user { align-self: flex-end; background: var(--gradient); color: white; border-bottom-right-radius: 4px; }
        .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid #1e293b; border-bottom-left-radius: 4px; }
        .msg-system { align-self: center; background: rgba(30, 41, 59, 0.5); color: var(--text-dim); font-size: 12px; padding: 6px 16px; border-radius: 20px; }
        
        .input-area { padding: 20px; background: var(--bg); display: flex; gap: 10px; border-top: 1px solid #1e293b; }
        #user-input {
            flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid #1e293b;
            background: #0f172a; color: white; outline: none; font-size: 15px;
        }
        #send-btn {
            padding: 0 24px; border-radius: 12px; border: none;
            background: var(--gradient); color: white; font-weight: bold; cursor: pointer;
        }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #setup-screen {
            position: fixed; inset: 0; background: #020617;
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }
        .setup-box {
            background: var(--card); padding: 40px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 400px;
            border: 1px solid #1e293b;
        }
        input#persona-input {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #1e293b; 
            background: #020617; color: white; box-sizing: border-box; margin-bottom: 20px;
            font-size: 15px;
        }
        .typing { padding: 10px 24px; font-size: 13px; color: var(--accent); display: none; }
    </style>
</head>
<body>

<nav id="navbar">
    <div style="font-weight: bold; font-size: 18px;">GEMINI AI CHAT</div>
    <div id="status-info" style="margin-left: auto; font-size: 11px; color: var(--text-dim);">연결됨</div>
</nav>

<div id="setup-screen">
    <div class="setup-box">
        <h2 style="margin-top: 0;">성격 설정</h2>
        <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 25px;">AI가 어떤 말투로 대답할지 정해주세요.</p>
        <input type="text" id="persona-input" placeholder="예: 무뚝뚝한 로봇, 다정한 상담원" value="친절하고 박학다식한 조수">
        <button id="start-btn" style="width:100%; padding:16px; border-radius:12px; border:none; background:var(--gradient); color:white; font-weight:bold; cursor:pointer;">대화 시작하기</button>
    </div>
</div>

<div id="chat-container">
    <div id="chat-log"></div>
    <div id="typing" class="typing">답변을 생성 중입니다...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off">
        <button id="send-btn">전송</button>
    </div>
</div>

<script type="module">
    // 시스템에서 제공하는 API 키 (빈 문자열 유지, 런타임 주입됨)
    const systemApiKey = ""; 
    
    // 사용자가 제공한 백업 키 리스트
    const backupKeys = [
        "AIzaSyAF-MPQ9bnBHOVpI2fBVGG3zHQW-pBYVpQ",
        "AIzaSyBph3eVitxFUIkBB1QRNYDS8lyTUgg7yrg",
        "AIzaSyDvR1d58iNJqpYck_gIGDW7Rc02u01-SpQ"
    ];

    // 시도할 모델 리스트 (우선순위 순)
    const MODEL_CANDIDATES = [
        "gemini-2.5-flash-preview-09-2025",
        "gemini-1.5-flash",
        "gemini-1.5-pro"
    ];

    let persona = "";
    const log = document.getElementById('chat-log');
    const uInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typing = document.getElementById('typing');
    const setupScreen = document.getElementById('setup-screen');
    const statusInfo = document.getElementById('status-info');

    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'msg-user' : (role === 'system' ? 'msg-system' : 'msg-ai')}`;
        div.innerText = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    async function requestAPI(key, model, userInput) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        const payload = {
            contents: [{ parts: [{ text: userInput }] }],
            systemInstruction: { parts: [{ text: `당신의 성격: ${persona}. 반드시 한국어로 답변하고, 친근하게 1~3문장 이내로 짧게 말하세요.` }] }
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || "API Error");
        }

        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text;
    }

    async function fetchAIResponse(userInput) {
        // 1. 모든 키 조합 (시스템 키 우선)
        const allKeys = [systemApiKey, ...backupKeys].filter(k => k !== undefined);
        
        for (const key of allKeys) {
            // 2. 각 키에 대해 작동하는 모델 찾기
            for (const model of MODEL_CANDIDATES) {
                try {
                    statusInfo.innerText = `${model} 연결 중...`;
                    // 지수 백오프 기반 재시도 (최대 2회)
                    for (let i = 0; i < 2; i++) {
                        try {
                            return await requestAPI(key, model, userInput);
                        } catch (e) {
                            if (i === 1) throw e;
                            await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                        }
                    }
                } catch (err) {
                    console.warn(`${model} 실패: ${err.message}`);
                    continue; // 다음 모델 시도
                }
            }
        }
        throw new Error("모든 모델과 API 키가 응답하지 않습니다. 네트워크나 할당량을 확인해주세요.");
    }

    async function handleSend() {
        const text = uInput.value.trim();
        if (!text || sendBtn.disabled) return;

        addMsg("user", text);
        uInput.value = "";
        sendBtn.disabled = true;
        typing.style.display = "block";

        try {
            const aiReply = await fetchAIResponse(text);
            typing.style.display = "none";
            addMsg("ai", aiReply);
            statusInfo.innerText = "연결됨";
        } catch (error) {
            typing.style.display = "none";
            addMsg("system", `오류: ${error.message}`);
            statusInfo.innerText = "연결 실패";
        } finally {
            sendBtn.disabled = false;
            uInput.focus();
        }
    }

    document.getElementById('start-btn').onclick = () => {
        persona = document.getElementById('persona-input').value.trim() || "친절한 조수";
        setupScreen.style.display = "none";
        addMsg("system", `대화가 시작되었습니다. (성격: ${persona})`);
    };

    uInput.onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
    document.getElementById('send-btn').onclick = handleSend;
</script>
</body>
</html>
